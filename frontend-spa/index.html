<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>E-Inventory Warung</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

  <div id="app"></div>

  <!-- Library CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Komponen -->
  <script src="components/Home.js"></script>
  <script src="components/Login.js"></script>
  <script src="components/Dashboard.js"></script>
  <script src="components/Barang.js"></script>
  <script src="components/Kategori.js"></script>
  <script src="components/Supplier.js"></script>
  <script src="components/Transaksi.js"></script>

  
  <!-- Router & App -->
  <script>
    // ============================================================
    // AXIOS INTERCEPTORS — otomatis sisipkan token ke setiap request
    // ============================================================
    axios.interceptors.request.use(config => {
      const token = localStorage.getItem('token');
      if (token) {
        config.headers['Authorization'] = 'Bearer ' + token;
      }
      return config;
    });

    // Tangkap error 401 secara global
    axios.interceptors.response.use(
      response => response,
      error => {
        if (error.response && error.response.status === 401) {
          alert('Sesi kamu sudah habis. Silakan login ulang.');
          localStorage.removeItem('token');
          localStorage.removeItem('isLoggedIn');
          localStorage.removeItem('nama');
          window.location.hash = '#/login';
        }
        return Promise.reject(error);
      }
    );

    window.onerror = function(message, source, lineno, colno, error) {
      console.error("GLOBAL ERROR:", message);
    };
    // ============================================================
    // VUE ROUTER
    // ============================================================
    const { createRouter, createWebHashHistory } = VueRouter;

    const routes = [
      { path: '/',          component: Home },
      { path: '/login',     component: Login },
      { path: '/dashboard', component: Dashboard, meta: { requiresAuth: true } },
      { path: '/barang',    component: Barang,    meta: { requiresAuth: true } },
      { path: '/kategori',  component: Kategori,  meta: { requiresAuth: true } },
      { path: '/supplier',  component: Supplier,  meta: { requiresAuth: true } },
      { path: '/transaksi', component: Transaksi, meta: { requiresAuth: true } },
    ];

    const router = createRouter({
      history: createWebHashHistory(),
      routes,
    });

    // Navigation Guard — cegah pengguna belum login masuk ke halaman admin
    router.beforeEach((to, from, next) => {
      const isLoggedIn = localStorage.getItem('isLoggedIn');
      if (to.meta.requiresAuth && !isLoggedIn) {
        next('/login');
      } else {
        next();
      }
    });

    // ============================================================
    // MOUNT APP
    // ============================================================
    const { createApp } = Vue;
    const app = createApp({
      template: `<router-view></router-view>`
    });
    app.use(router);
    app.mount('#app');
  </script>
</body>
</html>
